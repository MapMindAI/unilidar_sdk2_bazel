services:
  unilidar_sdk:
    image: yeliudm/arm64-ros2humble-opencv4.8.1:latest
    platform: linux/arm64
    container_name: UniLidarSdk
    privileged: true
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: "0"
    volumes:
      - /dev:/dev
      - ../../:/unilidar_sdk2_bazel
    working_dir: /unilidar_sdk2_bazel
    command:
      - bash
      - -lc
      - |
        echo '====> Starting UniLidarSdk'
        MIN_VALID_UNIX_TIME=1735689600
        while [ "$(date +%s)" -lt "$${MIN_VALID_UNIX_TIME}" ]; do
          echo "Waiting for valid system time before starting UniLidarSdk: $(date -Is)"
          sleep 1
        done
        source /opt/ros/humble/setup.bash
        export LD_LIBRARY_PATH="/opt/ros/humble/lib:/opt/ros/humble/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
        exec /unilidar_sdk2_bazel/docker_compose/unitree_lidar_sdk/unitree_lidar_rosnode --logtostderr=1 --stop_rotate_after_quit=true \
        --cloud_accumulate_rings=25 --alpha_bais_bias=-0.01 --range_fix_a0=0 --range_fix_a1=0

  recorder:
    image: yeliudm/arm64-ros2humble-opencv4.8.1:latest
    platform: linux/arm64
    container_name: Recorder
    privileged: true
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: "0"
    volumes:
      - /dev:/dev
      - ../../:/unilidar_sdk2_bazel
    working_dir: /unilidar_sdk2_bazel
    command:
      - bash
      - -lc
      - |
        echo '====> Starting Recorder'
        MIN_VALID_UNIX_TIME=1735689600
        while [ "$(date +%s)" -lt "$${MIN_VALID_UNIX_TIME}" ]; do
          echo "Waiting for valid system time before starting Recorder: $(date -Is)"
          sleep 1
        done
        source /opt/ros/humble/setup.bash
        export LD_LIBRARY_PATH="/opt/ros/humble/lib:/opt/ros/humble/lib/x86_64-linux-gnu:${LD_LIBRARY_PATH:-}"
        mkdir -p '/unilidar_sdk2_bazel/data/rosbags'
        BAG_NAME_SUFFIX=""
        BAG_NAME="unilidar_record_$(date +%Y%m%d_%H%M%S)_$${BAG_NAME_SUFFIX}"
        echo "Save to $${BAG_NAME}"
        exec ros2 bag record -o "/unilidar_sdk2_bazel/data/rosbags/$${BAG_NAME}" \
        --max-cache-size 2147483648 \
        /unilidar/imu /unilidar/cloud /rtk/fix \
        /camera/camera/depth/image_rect_raw /camera/camera/infra1/camera_info /camera/camera/infra1/image_rect_raw \
        /camera/camera/infra2/camera_info  /camera/camera/infra2/image_rect_raw /camera/camera/vio_20hz

  rtk_publisher:
    image: yeliudm/arm64-ros2humble-opencv4.8.1-rtk:latest
    platform: linux/arm64
    container_name: RtkPublisher
    privileged: true
    network_mode: host
    ipc: host
    pid: host
    environment:
      ROS_DOMAIN_ID: "0"
      RTK_SERIAL_PORT: ${RTK_SERIAL_PORT:-/dev/ttyUSB0}
      RTK_BAUDRATE: ${RTK_BAUDRATE:-115200}
      RTK_FRAME_ID: ${RTK_FRAME_ID:-rtk}
      RTK_FIX_TOPIC: ${RTK_FIX_TOPIC:-/rtk/fix}
      NTRIP_HOST: ${NTRIP_HOST:-}
      NTRIP_PORT: ${NTRIP_PORT:-2101}
      NTRIP_MOUNTPOINT: ${NTRIP_MOUNTPOINT:-}
      NTRIP_USER: ${NTRIP_USER:-}
      NTRIP_PASSWORD: ${NTRIP_PASSWORD:-}
      NTRIP_TLS: ${NTRIP_TLS:-false}
    volumes:
      - /dev:/dev
      - ../../:/unilidar_sdk2_bazel
    working_dir: /unilidar_sdk2_bazel
    command:
      - bash
      - -lc
      - |
        echo '====> Starting RtkPublisher'
        MIN_VALID_UNIX_TIME=1735689600
        while [ "$(date +%s)" -lt "$${MIN_VALID_UNIX_TIME}" ]; do
          echo "Waiting for valid system time before starting RtkPublisher: $(date -Is)"
          sleep 1
        done
        source /opt/ros/humble/setup.bash
        exec /usr/bin/python3 /unilidar_sdk2_bazel/tools/rtk_ros_publisher.py
